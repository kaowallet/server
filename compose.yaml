services:
  kao-proxy:
    build:
      context: .
      dockerfile: Containerfile
    environment:
      BIND_ADDR: "0.0.0.0:8080"
    secrets:
      - drpc_key
    restart: unless-stopped

  caddy:
    image: docker.io/library/caddy:2
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro,Z
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - kao-proxy
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:

secrets:
  drpc_key:
    external: true
