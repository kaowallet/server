name: Release

# Build and publish a container image to GHCR on every pushed tag.
on:
  push:
    tags:
      - "v*"

jobs:
  image:
    name: build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # required to push to ghcr.io
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive tags/labels from the git ref. A semver tag like v1.2.3 yields
      # 1.2.3, 1.2, 1 and (on the default branch) latest; any other tag is used
      # verbatim. The git sha is always added as an extra tag.
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=tag
            type=sha

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
